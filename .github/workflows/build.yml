name: Build NetPulse

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: NetPulse-linux
          - os: windows-latest
            artifact_name: NetPulse-windows.exe

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libgirepository1.0-dev \
          libcairo2-dev \
          pkg-config \
          gir1.2-gtk-3.0 \
          gir1.2-webkit2-4.0 \
          python3-gi \
          python3-gi-cairo

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        # Встановлюємо всі бібліотеки, включаючи qtpy та PyGObject
        pip install pyinstaller pywebview PyQt6 PyQt6-WebEngine flask fastapi uvicorn asyncssh qtpy PyGObject
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Build with PyInstaller
      shell: bash
      run: |
        pyinstaller --onefile \
          --name ${{ matrix.artifact_name }} \
          --collect-all pywebview \
          --collect-all PyQt6 \
          --hidden-import gi \
          --hidden-import qtpy \
          --hidden-import PyQt6.QtWebEngineCore \
          --clean main.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/${{ matrix.artifact_name }}*