name: Build NetPulse

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: NetPulse-linux
          - os: windows-latest
            artifact_name: NetPulse-windows.exe

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pywebview PyQt6 PyQt6-WebEngine flask fastapi uvicorn
        # Якщо файл є, він встановить решту, якщо ні — просто піде далі
        python -c "import os; os.system('pip install -r requirements.txt') if os.path.exists('requirements.txt') else None"

    - name: Build with PyInstaller
      shell: bash
      run: |
        # Ми використовуємо bash для обох систем, щоб команда була однаковою
        pyinstaller --onefile --name ${{ matrix.artifact_name }} --clean main.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/${{ matrix.artifact_name }}*