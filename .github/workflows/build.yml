name: Build NetPulse

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: NetPulse-linux
          - os: windows-latest
            artifact_name: NetPulse-windows.exe

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Встановлюємо все необхідне для GUI
        pip install pyinstaller pywebview PyQt6 PyQt6-WebEngine flask fastapi uvicorn asyncssh qtpy
        
        # Спеціальні бібліотеки для Linux, щоб працювало вікно (GTK/GObject)
        if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libgirepository1.0-dev pkg-config python3-gi python3-gi-cairo gir1.2-gtk-3.0
          pip install PyGObject
        fi

    - name: Build with PyInstaller
      shell: bash
      run: |
        pyinstaller --onefile \
          --name ${{ matrix.artifact_name }} \
          --collect-all pywebview \
          --collect-all PyQt6 \
          --collect-all asyncssh \
          --hidden-import gi \
          --hidden-import qtpy \
          --hidden-import PyQt6.QtWebEngineCore \
          --clean main.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/${{ matrix.artifact_name }}*