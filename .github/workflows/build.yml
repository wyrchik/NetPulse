name: Build NetPulse

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: NetPulse-linux
          - os: windows-latest
            artifact_name: NetPulse-windows.exe

    steps:
    - uses: actions/checkout@v4  # Оновлено до v4

    - name: Set up Python
      uses: actions/setup-python@v5  # Оновлено до v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pyinstaller

    - name: Build with PyInstaller
      shell: bash
      run: |
        pyinstaller --onefile --name ${{ matrix.artifact_name }} main.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4  # Оновлено до v4 (це виправить помилку!)
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/${{ matrix.artifact_name }}*